// 死活题控制器
// ═══════════════════════════════════════════════════════
let tsGame = null, tsRenderer = null, tsLevel = null;
let tsAttempts = 0, tsSolved = false;
let completedTsumego = new Set(JSON.parse(localStorage.getItem('xtgo_ts') || '[]'));

function renderTsChapters() {
  const grid = document.getElementById('ts-chapters-grid');
  grid.innerHTML = '';
  TS_CHAPTERS.forEach(ch => {
    const prog = ch.levels.filter(l => completedTsumego.has(l)).length;
    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `<div class="chapter-icon">${ch.icon}</div><div class="chapter-name">${ch.name}</div><div class="chapter-progress">${prog}/${ch.levels.length} 完成</div>`;
    card.onclick = () => showTsLevelSelect(ch);
    grid.appendChild(card);
  });
}

function showTsLevelSelect(ch) {
  document.getElementById('ts-lvl-title').textContent = `${ch.icon} ${ch.name}`;
  const grid = document.getElementById('ts-levels-grid');
  grid.innerHTML = '';
  ch.levels.forEach((lid, i) => {
    const lv = TSUMEGO[lid];
    const done = completedTsumego.has(lid);
    const firstUndone = ch.levels.findIndex(l => !completedTsumego.has(l));
    const locked = i > firstUndone + 1;
    const btn = document.createElement('div');
    btn.className = 'level-btn' + (done?' completed':(locked?' locked':(i===firstUndone?' cur':'')));
    btn.innerHTML = `<div class="lnum" style="color:${done?'var(--green)':'#e57373'}">${done?'✓':lid+1}</div><div style="font-size:.72rem;margin-top:3px">${lv.title}</div>`;
    if (!locked) btn.onclick = () => startTsumego(lid);
    grid.appendChild(btn);
  });
  showScreen('tsumego-level-screen');
}

function startTsumego(lid) {
  tsLevel = TSUMEGO[lid];
  tsGame = new GoGame(tsLevel.boardSize);
  tsRenderer = new BoardRenderer(document.getElementById('tsumego-canvas'));
  tsRenderer.setup(tsLevel.boardSize);
  tsAttempts = 0; tsSolved = false;

  for (const [r,c,col] of tsLevel.setup) tsGame.board[r][c] = col;
  tsGame.currentPlayer = tsLevel.playerColor;

  // 保存初始状态
  tsGame._initBoard = tsGame.board.map(r=>[...r]);

  const ch = TS_CHAPTERS.find(c=>c.levels.includes(lid));
  const chIdx = ch ? TS_CHAPTERS.indexOf(ch)+1 : 1;
  const lvIdx = ch ? ch.levels.indexOf(lid)+1 : 1;
  document.getElementById('ts-tag').textContent = `死活题 · ${ch?ch.name:'未知'} · 第${lvIdx}题`;
  document.getElementById('ts-title').textContent = tsLevel.title;
  document.getElementById('ts-desc').textContent = tsLevel.desc;
  document.getElementById('ts-goal').textContent = tsLevel.goalText;
  document.getElementById('ts-hint').textContent = tsLevel.hint;
  document.getElementById('ts-hint').classList.remove('on');
  document.getElementById('ts-result').className = 'ts-result';
  document.getElementById('ts-result').textContent = '';
  document.getElementById('ts-next-btn').style.display = 'none';
  document.getElementById('ts-attempts').textContent = '';

  // 高亮目标棋串
  if (tsLevel.targetStone) {
    const tg = tsGame.getGroup(tsLevel.targetStone[0], tsLevel.targetStone[1]);
    tsRenderer.highlights = tg.stones.map(([r,c])=>({r,c,type:'target'}));
  }

  setupTsCanvas();
  showScreen('tsumego-game-screen');
  tsRenderer.draw(tsGame);
}

function setupTsCanvas() {
  const cv = document.getElementById('tsumego-canvas');
  cv.style.touchAction = 'none';
  cv.onpointerdown  = e => { e.preventDefault(); handleTsClick(e); };
  cv.onpointermove  = e => {
    if (!tsRenderer||!tsGame||tsSolved) return;
    const pt = tsRenderer.getIntersection(e.clientX, e.clientY);
    tsRenderer.hover = pt ? {r:pt[0], c:pt[1]} : null;
    tsRenderer.hoverColor = tsGame.currentPlayer;
    tsRenderer.draw(tsGame);
  };
  cv.onpointerleave = () => { if (tsRenderer) { tsRenderer.hover=null; tsRenderer.draw(tsGame); } };
}

function handleTsClick(e) {
  if (!tsGame||!tsRenderer||tsSolved) return;
  const pt = tsRenderer.getIntersection(e.clientX, e.clientY);
  if (!pt) return;
  const [r,c] = pt;
  if (!tsGame.isValidMove(r,c,tsGame.currentPlayer)) return;

  tsGame.placeStone(r,c);
  tsRenderer.lastMove = [r,c];
  tsRenderer.hover = null;

  // 更新高亮：显示目标棋串
  updateTsHighlights();
  tsRenderer.draw(tsGame);

  // 检查目标
  if (checkTsGoal()) {
    tsSolved = true;
    completedTsumego.add(tsLevel.id);
    localStorage.setItem('xtgo_ts', JSON.stringify([...completedTsumego]));
    document.getElementById('ts-result').className = 'ts-result correct';
    document.getElementById('ts-result').textContent = '✓ 正确！' + tsLevel.completion;
    document.getElementById('ts-next-btn').style.display = '';
    return;
  }

  // 如果是kill题且目标仍存活，AI防守一手
  if (tsLevel.goal === 'kill' && !tsSolved) {
    setTimeout(() => {
      const defColor = 3 - tsLevel.playerColor;
      const defMove = getTsDefenseMove(defColor);
      if (defMove) {
        tsGame.placeStone(defMove[0],defMove[1]);
        tsRenderer.lastMove = defMove;
        updateTsHighlights();
        tsRenderer.draw(tsGame);
        if (checkTsGoal()) {
          tsSolved = true;
          completedTsumego.add(tsLevel.id);
          localStorage.setItem('xtgo_ts', JSON.stringify([...completedTsumego]));
          document.getElementById('ts-result').className = 'ts-result correct';
          document.getElementById('ts-result').textContent = '✓ 正确！' + tsLevel.completion;
          document.getElementById('ts-next-btn').style.display = '';
        }
      }
    }, 350);
  }

  // 错误尝试计数（live题：若10手仍未做活）
  tsAttempts++;
  if (tsAttempts >= 10 && !tsSolved) {
    document.getElementById('ts-result').className = 'ts-result wrong';
    document.getElementById('ts-result').textContent = '未找到正解，点击"重置"重试，或查看提示。';
    document.getElementById('ts-attempts').textContent = `已尝试${tsAttempts}手`;
  }
}

function checkTsGoal() {
  if (!tsLevel||!tsGame) return false;
  if (tsLevel.goal === 'kill') {
    // 目标棋串是否已被提走
    const [tr,tc] = tsLevel.targetStone;
    if (tsGame.board[tr][tc] === 0) return true; // 已被提
    const g = tsGame.getGroup(tr,tc);
    // 或者目标棋串0气（下一手必死）
    return g.liberties.length === 0;
  }
  if (tsLevel.goal === 'live') {
    // 玩家棋串是否已有2+眼
    return countEyes(tsGame, tsLevel.playerColor) >= 2;
  }
  return false;
}

function getTsDefenseMove(color) {
  // 防守：优先给目标棋串增加气（对kill题为白棋防守）
  const moves = tsGame.getValidMoves(color);
  if (!moves.length) return null;
  const [tr,tc] = tsLevel.targetStone;
  if (tsGame.board[tr][tc] === 0) return null; // 已死
  const g = tsGame.getGroup(tr,tc);
  if (g.liberties.length > 0) {
    // 优先把气多的连接棋子
    const liberties = g.liberties;
    const valid = liberties.filter(([r,c])=>tsGame.isValidMove(r,c,color));
    if (valid.length) return valid[0];
  }
  return moves[Math.floor(Math.random()*Math.min(moves.length,5))];
}

function updateTsHighlights() {
  if (!tsLevel||!tsGame||!tsLevel.targetStone) return;
  const [tr,tc] = tsLevel.targetStone;
  if (tsGame.board[tr][tc] === 0) { tsRenderer.highlights = []; return; }
  const g = tsGame.getGroup(tr,tc);
  tsRenderer.highlights = g.stones.map(([r,c])=>({r,c,type:'target'}));
}

function tsumegoReset() {
  if (!tsLevel) return;
  startTsumego(tsLevel.id);
}

function toggleTsHint() { document.getElementById('ts-hint').classList.toggle('on'); }

function tsNextLevel() {
  if (!tsLevel) return;
  const ch = TS_CHAPTERS.find(c=>c.levels.includes(tsLevel.id));
  if (!ch) return;
  const idx = ch.levels.indexOf(tsLevel.id);
  if (idx < ch.levels.length-1) {
    startTsumego(ch.levels[idx+1]);
  } else {
    // 找下一章
    const chIdx = TS_CHAPTERS.indexOf(ch);
    if (chIdx < TS_CHAPTERS.length-1) {
      showTsLevelSelect(TS_CHAPTERS[chIdx+1]);
    } else {
      showScreen('tsumego-chapter-screen');
    }
  }
}

showScreen('menu-screen');

// ── PWA Service Worker 注册 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── 浏览器 AI 预热：打开对战界面时静默预加载模型 ──
// （由 startBattle 内 BrowserKataGoAI 构造时自动触发 _ensureModel）
</script>
