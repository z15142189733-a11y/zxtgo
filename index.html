<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Z.X.T 围棋</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZXT围棋">
<meta name="theme-color" content="#c9a84c">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--panel:#1a1a2e;--accent:#c9a84c;--accent2:#7b68ee;
  --board0:#dbb86a;--board1:#c9a84c;
  --text:#e8e8f0;--text-dim:#7777aa;
  --green:#4caf50;--red:#e53935;
}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif;height:100dvh;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── SCREENS ─── */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100dvh;height:100vh;padding:20px}
.screen.active{display:flex}

/* ─── MENU ─── */
#menu-screen{background:radial-gradient(ellipse at 40% 40%,#1e1e40 0%,#0f0f1a 65%)}
.logo{text-align:center;margin-bottom:44px;position:relative}
.logo h1{font-size:3.2rem;font-weight:800;letter-spacing:4px;color:var(--accent);text-shadow:0 0 40px rgba(201,168,76,.3)}
.logo-sub{color:var(--text-dim);font-size:.82rem;margin-top:8px;letter-spacing:6px}
.logo-deco{display:flex;gap:6px;justify-content:center;margin-top:14px}
.logo-deco span{width:10px;height:10px;border-radius:50%}
.logo-deco span:nth-child(odd){background:radial-gradient(circle at 35% 35%,#555,#111)}
.logo-deco span:nth-child(even){background:radial-gradient(circle at 35% 35%,#fff,#ccc)}
.menu-btn{display:block;width:240px;padding:14px 0;margin:9px auto;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:2px}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#e8c060);color:#1a1000}
.btn-secondary{background:var(--panel);color:var(--accent);border:1px solid rgba(201,168,76,.4)}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.25)}

/* ─── CHAPTER SELECT ─── */
#chapter-screen{gap:16px}
.screen-title{font-size:1.5rem;font-weight:800;color:var(--accent);margin-bottom:4px;text-align:center;letter-spacing:2px}
.screen-sub{color:var(--text-dim);font-size:.82rem;margin-bottom:12px;text-align:center}
.chapters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;max-width:900px;width:100%}
.chapter-card{background:var(--panel);border:1px solid #252545;border-radius:16px;padding:20px 14px;cursor:pointer;transition:all .2s;text-align:center}
.chapter-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.12)}
.chapter-card.locked{opacity:.35;cursor:not-allowed;pointer-events:none}
.chapter-icon{font-size:2rem;margin-bottom:8px}
.chapter-name{font-weight:700;font-size:.95rem;color:var(--text)}
.chapter-progress{font-size:.78rem;color:var(--accent);margin-top:6px}

/* ─── LEVEL SELECT ─── */
#level-screen{gap:20px}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px;max-width:680px;width:100%}
.level-btn{aspect-ratio:1;border:2px solid #252545;border-radius:12px;background:var(--panel);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;font-size:.78rem;color:var(--text-dim)}
.level-btn .lnum{font-size:1.3rem;font-weight:800;color:var(--text)}
.level-btn.completed{border-color:var(--green);background:rgba(76,175,80,.06)}
.level-btn.completed .lnum{color:var(--green)}
.level-btn.cur{border-color:var(--accent);background:rgba(201,168,76,.08)}
.level-btn.cur .lnum{color:var(--accent)}
.level-btn.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.level-btn:not(.locked):hover{border-color:var(--accent);transform:scale(1.06)}

/* ─── GAME SCREEN ─── */
#game-screen{flex-direction:row;gap:0;padding:0;align-items:stretch;justify-content:flex-start;height:100dvh;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:260px;background:var(--panel);display:flex;flex-direction:column;padding:18px 16px;gap:11px;overflow-y:auto;border-right:1px solid #22224a}
.game-main{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}

/* sidebar pieces */
.s-tag{font-size:.7rem;color:var(--text-dim);letter-spacing:2px}
.s-title{font-size:1.15rem;font-weight:800;color:var(--accent);line-height:1.3;margin-top:2px}
.concept-box{background:#101028;border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:11px 12px;font-size:.82rem;line-height:1.65;color:#b0b0d8}
.concept-label{font-size:.68rem;font-weight:700;color:var(--accent2);margin-bottom:5px;letter-spacing:1px}
.goal-box{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.22);border-radius:10px;padding:11px}
.goal-label{font-size:.68rem;color:var(--text-dim);letter-spacing:1px;margin-bottom:3px}
.goal-text{font-size:.88rem;font-weight:700;color:var(--accent)}
.hint-btn{background:none;border:1px dashed #333360;border-radius:8px;padding:7px 11px;color:var(--text-dim);cursor:pointer;font-size:.8rem;transition:all .2s;text-align:left;width:100%}
.hint-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.hint-text{display:none;font-size:.8rem;color:#8888bb;margin-top:6px;line-height:1.6;padding:8px;background:#0c0c22;border-radius:6px}
.hint-text.on{display:block}
.status-bar{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:9px 12px;background:#0f0f28;border-radius:10px}
.stone-ind{display:flex;align-items:center;gap:7px;font-size:.82rem}
.sdot{width:15px;height:15px;border-radius:50%;display:inline-block;flex-shrink:0}
.sdot.b{background:radial-gradient(circle at 35% 35%,#555,#111)}
.sdot.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.cap-count{font-size:.78rem;color:var(--text-dim)}
.inf-toggle{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text-dim);cursor:pointer;padding:5px 8px;border-radius:7px;transition:background .2s}
.inf-toggle:hover{background:#1a1a3a}
.inf-toggle input{accent-color:var(--accent2)}
.actions{display:flex;flex-direction:column;gap:7px;margin-top:auto}
.act-btn{padding:9px;border:none;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s;letter-spacing:1px}
.btn-pass{background:#1e1e3a;color:var(--text-dim)}
.btn-pass:hover{background:#2a2a4a;color:var(--text)}
.btn-undo{background:#1e1e3a;color:var(--text-dim)}
.btn-undo:hover{background:#2a2a4a;color:var(--text)}
.btn-back{background:none;color:var(--text-dim);border:1px solid #252545;border-radius:8px;padding:8px;cursor:pointer;font-size:.8rem;transition:all .2s;letter-spacing:1px}
.btn-back:hover{color:var(--text);border-color:#4a4a6a}
.ai-thinking{font-size:.78rem;color:var(--accent2);padding:5px 0;min-height:20px}

/* ─── CANVAS ─── */
#board-canvas,#battle-canvas{border-radius:6px;cursor:crosshair;max-width:calc(100vh - 60px);max-height:calc(100vh - 60px)}

/* ─── MODALS ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.on{display:flex}
.modal{background:var(--panel);border:1px solid #33335a;border-radius:20px;padding:32px;max-width:440px;width:90%;text-align:center}
.modal-icon{font-size:2.8rem;margin-bottom:10px}
.modal-title{font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:14px;letter-spacing:1px}
.modal-body{font-size:.88rem;line-height:1.75;color:#b0b0d8;margin-bottom:22px}
.modal-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.mbtn{padding:11px 22px;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px}
.mbtn-p{background:linear-gradient(135deg,#c9a84c,#e8c060);color:#1a1000}
.mbtn-s{background:#252545;color:var(--text)}
.mbtn:hover{transform:translateY(-2px)}

/* ─── BATTLE ─── */
#battle-screen{flex-direction:row;gap:0;padding:0;align-items:stretch;justify-content:flex-start;height:100dvh;height:100vh;overflow:hidden}

/* ─── DIFFICULTY ─── */
#difficulty-screen{gap:18px}
.diff-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:680px}
.diff-card{background:var(--panel);border:2px solid #252545;border-radius:16px;padding:22px 28px;cursor:pointer;transition:all .2s;text-align:center;min-width:170px}
.diff-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.35)}
.diff-card.easy:hover{border-color:#4caf50}
.diff-card.medium:hover{border-color:#ff9800}
.diff-card.hard:hover{border-color:#e53935}
.diff-icon{font-size:2rem;margin-bottom:8px}
.diff-name{font-size:1.05rem;font-weight:800;letter-spacing:1px}
.diff-desc{font-size:.78rem;color:var(--text-dim);margin-top:7px;line-height:1.5}
/* 路数选择 */
.size-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.size-btn{padding:10px 28px;border:2px solid #252545;border-radius:12px;background:var(--panel);color:var(--text-dim);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:2px}
.size-btn:hover{border-color:var(--accent);color:var(--accent)}
.size-btn.active{border-color:var(--accent);background:rgba(201,168,76,.1);color:var(--accent)}
.size-label{font-size:.8rem;color:var(--text-dim);text-align:center;margin-top:2px}
.score-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #22224a;font-size:.82rem}
.score-lbl{color:var(--text-dim)}
.score-val{font-weight:700}

/* ─── TSUMEGO ─── */
#tsumego-chapter-screen{gap:16px}
#tsumego-level-screen{gap:20px}
#tsumego-game-screen{flex-direction:row;gap:0;padding:0;align-items:stretch;justify-content:flex-start;height:100dvh;height:100vh;overflow:hidden}
.tsumego-tag{font-size:.68rem;color:#e57373;letter-spacing:2px;font-weight:700}
.ts-goal-box{background:rgba(229,115,115,.08);border:1px solid rgba(229,115,115,.3);border-radius:10px;padding:11px}
.ts-goal-label{font-size:.68rem;color:#e57373;letter-spacing:1px;margin-bottom:3px}
.ts-goal-text{font-size:.88rem;font-weight:700;color:#ffcdd2}
.ts-result{display:none;padding:10px 12px;border-radius:10px;font-size:.85rem;font-weight:700;text-align:center;margin-top:4px}
.ts-result.correct{display:block;background:rgba(76,175,80,.15);color:#a5d6a7;border:1px solid rgba(76,175,80,.3)}
.ts-result.wrong{display:block;background:rgba(229,115,115,.12);color:#ef9a9a;border:1px solid rgba(229,115,115,.25)}
.ts-attempts{font-size:.78rem;color:var(--text-dim);margin-top:4px;text-align:center}
/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333360;border-radius:2px}

/* ─── MOBILE LAYOUT ─── */
@media(max-width:700px),(pointer:coarse){
  #game-screen,#battle-screen,#tsumego-game-screen{flex-direction:column}
  .sidebar{
    width:100%!important;min-width:unset;
    max-height:220px;border-right:none;
    border-top:1px solid #22224a;
    order:2;overflow-y:auto;
    padding:10px 12px;gap:8px;
  }
  .game-main{order:1;flex:1;min-height:0}
  /* bigger touch targets */
  .act-btn{padding:12px;min-height:44px}
  .btn-back{min-height:40px}
  .mbtn{padding:13px 20px;min-height:44px}
  .menu-btn{padding:16px 0;min-height:50px}
  .hint-btn{min-height:40px;padding:9px 11px}
  /* canvas fills board area */
  #board-canvas,#battle-canvas,#tsumego-canvas{
    max-width:calc(100vw - 8px)!important;
    max-height:calc(100dvh - 240px)!important;
    max-height:calc(100vh - 240px)!important;
  }
}
</style>
</head>
<body>

<!-- 主菜单 -->
<div id="menu-screen" class="screen active">
  <div class="logo">
    <h1>Z.X.T 围棋</h1>
    <div class="logo-deco">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <button class="menu-btn btn-primary" onclick="showScreen('chapter-screen')">关卡模式</button>
  <button class="menu-btn btn-primary" style="background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff" onclick="showScreen('tsumego-chapter-screen')">死活题</button>
  <button class="menu-btn btn-secondary" onclick="showScreen('difficulty-screen')">自由对战</button>
</div>

<!-- 章节选择 -->
<div id="chapter-screen" class="screen">
  <div class="screen-title">选择章节</div>
  <div class="screen-sub">每章通过对局掌握一个核心概念，循序渐进</div>
  <div class="chapters-grid" id="chapters-grid"></div>
  <button class="btn-back" style="margin-top:14px" onclick="showScreen('menu-screen')">← 返回主菜单</button>
</div>

<!-- 关卡选择 -->
<div id="level-screen" class="screen">
  <div class="screen-title" id="lvl-screen-title"></div>
  <div class="levels-grid" id="levels-grid"></div>
  <button class="btn-back" style="margin-top:14px" onclick="showScreen('chapter-screen')">← 返回章节</button>
</div>

<!-- 关卡对局 -->
<div id="game-screen" class="screen">
  <div class="sidebar">
    <div>
      <div class="s-tag" id="s-tag">第一章 · 第1关</div>
      <div class="s-title" id="s-title">落子</div>
    </div>
    <div class="concept-box">
      <div class="concept-label">本关概念</div>
      <div id="s-concept"></div>
    </div>
    <div class="goal-box">
      <div class="goal-label">本关目标</div>
      <div class="goal-text" id="s-goal"></div>
    </div>
    <div>
      <button class="hint-btn" onclick="toggleHint()">💡 提示</button>
      <div class="hint-text" id="s-hint"></div>
    </div>
    <div class="status-bar">
      <div class="stone-ind">
        <span class="sdot b" id="s-turn-dot"></span>
        <span id="s-turn">你的回合（黑）</span>
      </div>
      <div class="cap-count" id="s-cap">提子 ●0 ○0</div>
    </div>
    <div class="ai-thinking" id="ai-think-label"></div>
    <label class="inf-toggle">
      <input type="checkbox" id="inf-toggle" onchange="toggleCampaignInf()"> 显示势力图
    </label>
    <div class="actions">
      <button class="act-btn btn-undo" onclick="undoMove()">↩ 悔棋</button>
      <button class="act-btn btn-pass" onclick="passMove()">⏭ 虚手</button>
      <button class="btn-back" onclick="showScreen('chapter-screen')">← 返回章节</button>
    </div>
  </div>
  <div class="game-main">
    <canvas id="board-canvas"></canvas>
  </div>
</div>

<!-- 死活题章节选择 -->
<div id="tsumego-chapter-screen" class="screen">
  <div class="screen-title">死活题</div>
  <div class="screen-sub">从易到难，训练计算力与大局观</div>
  <div class="chapters-grid" id="ts-chapters-grid"></div>
  <button class="btn-back" style="margin-top:14px" onclick="showScreen('menu-screen')">← 返回主菜单</button>
</div>

<!-- 死活题关卡选择 -->
<div id="tsumego-level-screen" class="screen">
  <div class="screen-title" id="ts-lvl-title"></div>
  <div class="levels-grid" id="ts-levels-grid"></div>
  <button class="btn-back" style="margin-top:14px" onclick="showScreen('tsumego-chapter-screen')">← 返回章节</button>
</div>

<!-- 死活题游戏 -->
<div id="tsumego-game-screen" class="screen">
  <div class="sidebar">
    <div>
      <div class="tsumego-tag" id="ts-tag">死活题 · 初级 · 第1题</div>
      <div class="s-title" id="ts-title">标题</div>
    </div>
    <div class="concept-box">
      <div class="concept-label">题目说明</div>
      <div id="ts-desc"></div>
    </div>
    <div class="ts-goal-box">
      <div class="ts-goal-label">目标</div>
      <div class="ts-goal-text" id="ts-goal"></div>
    </div>
    <div>
      <button class="hint-btn" onclick="toggleTsHint()">💡 提示</button>
      <div class="hint-text" id="ts-hint"></div>
    </div>
    <div class="ts-result" id="ts-result"></div>
    <div class="ts-attempts" id="ts-attempts"></div>
    <div class="actions">
      <button class="act-btn btn-undo" onclick="tsumegoReset()">↩ 重置</button>
      <button class="mbtn mbtn-p" id="ts-next-btn" style="display:none;margin-top:4px" onclick="tsNextLevel()">下一题 →</button>
      <button class="btn-back" onclick="showScreen('tsumego-chapter-screen')">← 返回</button>
    </div>
  </div>
  <div class="game-main">
    <canvas id="tsumego-canvas"></canvas>
  </div>
</div>

<!-- 难度选择 -->
<div id="difficulty-screen" class="screen">
  <div class="screen-title">自由对战设置</div>

  <div style="width:100%;max-width:680px">
    <div class="size-label" style="font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:10px;text-align:center">选择棋盘路数</div>
    <div class="size-row">
      <button class="size-btn active" id="size-btn-9" onclick="selectSize(9)">9 路</button>
      <button class="size-btn" id="size-btn-13" onclick="selectSize(13)">13 路</button>
      <button class="size-btn" id="size-btn-19" onclick="selectSize(19)">19 路</button>
    </div>
    <div class="size-label" style="margin-top:6px" id="size-desc">9×9 · 入门标准棋盘，对局约10分钟</div>
  </div>

  <div class="size-label" style="font-size:.9rem;font-weight:700;color:var(--text);margin-top:4px;margin-bottom:2px;text-align:center">选择难度</div>
  <div class="diff-cards">
    <div class="diff-card easy" onclick="startBattle('easy')">
      <div class="diff-icon">🌱</div>
      <div class="diff-name">入门</div>
      <div class="diff-desc">会提子、会防守<br>适合初学者练习</div>
    </div>
    <div class="diff-card medium" onclick="startBattle('medium')">
      <div class="diff-icon">🌿</div>
      <div class="diff-name">进阶</div>
      <div class="diff-desc">19路: 神经网络AI<br>9/13路: MCTS</div>
    </div>
    <div class="diff-card hard" onclick="startBattle('hard')">
      <div class="diff-icon">🌳</div>
      <div class="diff-name">挑战</div>
      <div class="diff-desc">19路: KataGo约2段<br>9/13路: 强力MCTS</div>
    </div>
  </div>
  <button class="btn-back" style="margin-top:10px" onclick="showScreen('menu-screen')">← 返回主菜单</button>
</div>

<!-- 自由对战 -->
<div id="battle-screen" class="screen">
  <div class="sidebar">
    <div>
      <div class="s-tag" id="b-diff-tag">入门难度</div>
      <div class="s-title">自由对战</div>
    </div>
    <div class="status-bar">
      <div class="stone-ind">
        <span class="sdot" id="b-turn-dot"></span>
        <span id="b-turn">你的回合</span>
      </div>
    </div>
    <div style="padding:10px;background:#0f0f28;border-radius:10px">
      <div class="score-row"><span class="score-lbl">黑方提子</span><span class="score-val" id="b-cap">0</span></div>
      <div class="score-row"><span class="score-lbl">白方提子</span><span class="score-val" id="w-cap">0</span></div>
      <div class="score-row" style="border:none"><span class="score-lbl">步数</span><span class="score-val" id="b-moves">0</span></div>
    </div>
    <div class="ai-thinking" id="b-ai-think"></div>
    <div id="b-ai-badge" style="font-size:.72rem;padding:4px 8px;border-radius:6px;background:#1a1a2e;color:#7777aa;margin-top:-4px;display:none"></div>
    <label class="inf-toggle">
      <input type="checkbox" id="b-inf-toggle" onchange="toggleBattleInf()"> 显示势力图
    </label>
    <div class="actions">
      <button class="act-btn btn-pass" onclick="battlePass()">⏭ 虚手</button>
      <button class="act-btn btn-undo" onclick="battleUndo()">↩ 悔棋</button>
      <button class="act-btn" style="background:#1e0f0f;color:#e57373" onclick="resignGame()">🏳 认输</button>
      <button class="btn-back" onclick="showScreen('difficulty-screen')">← 返回</button>
    </div>
  </div>
  <div class="game-main">
    <canvas id="battle-canvas"></canvas>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════════
class GoGame {
  constructor(size) {
    this.size = size;
    this.board = Array(size).fill(null).map(() => Array(size).fill(0));
    this.currentPlayer = 1;
    this.captured = [0, 0];
    this.koPoint = null;
    this.history = [];
    this.moveCount = 0;
    this.consecutivePasses = 0;
  }
  clone() {
    const g = new GoGame(this.size);
    g.board = this.board.map(r => [...r]);
    g.currentPlayer = this.currentPlayer;
    g.captured = [...this.captured];
    g.koPoint = this.koPoint ? [...this.koPoint] : null;
    g.moveCount = this.moveCount;
    g.consecutivePasses = this.consecutivePasses;
    return g;
  }
  saveState() {
    return {
      board: this.board.map(r => [...r]),
      currentPlayer: this.currentPlayer,
      captured: [...this.captured],
      koPoint: this.koPoint ? [...this.koPoint] : null,
      moveCount: this.moveCount,
      consecutivePasses: this.consecutivePasses
    };
  }
  restoreState(s) {
    this.board = s.board.map(r => [...r]);
    this.currentPlayer = s.currentPlayer;
    this.captured = [...s.captured];
    this.koPoint = s.koPoint ? [...s.koPoint] : null;
    this.moveCount = s.moveCount;
    this.consecutivePasses = s.consecutivePasses;
  }
  inBounds(r, c) { return r >= 0 && r < this.size && c >= 0 && c < this.size; }
  neighbors(r, c) {
    return [[-1,0],[1,0],[0,-1],[0,1]].map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>this.inBounds(nr,nc));
  }
  getGroup(r, c) {
    const color = this.board[r][c];
    if (!color) return { stones: [], liberties: [] };
    const visited = new Set(), stones = [], libSet = new Set(), stack = [[r, c]];
    while (stack.length) {
      const [cr, cc] = stack.pop();
      const key = cr * this.size + cc;
      if (visited.has(key)) continue;
      visited.add(key); stones.push([cr, cc]);
      for (const [nr, nc] of this.neighbors(cr, cc)) {
        if (this.board[nr][nc] === 0) libSet.add(nr * this.size + nc);
        else if (this.board[nr][nc] === color) stack.push([nr, nc]);
      }
    }
    return { stones, liberties: [...libSet].map(k => [Math.floor(k/this.size), k%this.size]) };
  }
  isValidMove(r, c, color) {
    if (!this.inBounds(r, c) || this.board[r][c] !== 0) return false;
    if (this.koPoint && this.koPoint[0] === r && this.koPoint[1] === c) return false;
    this.board[r][c] = color;
    const opp = 3 - color;
    let captures = 0;
    for (const [nr, nc] of this.neighbors(r, c))
      if (this.board[nr][nc] === opp && this.getGroup(nr, nc).liberties.length === 0) captures++;
    const valid = this.getGroup(r, c).liberties.length > 0 || captures > 0;
    this.board[r][c] = 0;
    return valid;
  }
  placeStone(r, c) {
    if (!this.isValidMove(r, c, this.currentPlayer)) return false;
    this.history.push(this.saveState());
    const color = this.currentPlayer, opp = 3 - color;
    this.board[r][c] = color;
    let captured = 0; const capturedPts = [];
    for (const [nr, nc] of this.neighbors(r, c)) {
      if (this.board[nr][nc] === opp) {
        const g = this.getGroup(nr, nc);
        if (g.liberties.length === 0) {
          for (const [sr, sc] of g.stones) { this.board[sr][sc] = 0; capturedPts.push([sr, sc]); }
          captured += g.stones.length;
        }
      }
    }
    if (color === 1) this.captured[0] += captured; else this.captured[1] += captured;
    this.koPoint = null;
    if (captured === 1 && capturedPts.length === 1) {
      const mg = this.getGroup(r, c);
      if (mg.stones.length === 1 && mg.liberties.length === 1) this.koPoint = capturedPts[0];
    }
    this.consecutivePasses = 0; this.moveCount++; this.currentPlayer = opp;
    return true;
  }
  pass() {
    this.history.push(this.saveState());
    this.consecutivePasses++; this.currentPlayer = 3 - this.currentPlayer;
    this.moveCount++; this.koPoint = null;
  }
  undo() {
    if (!this.history.length) return false;
    this.restoreState(this.history.pop()); return true;
  }
  calculateInfluence() {
    const inf = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
    for (let r = 0; r < this.size; r++) for (let c = 0; c < this.size; c++) {
      if (!this.board[r][c]) continue;
      const sign = this.board[r][c] === 1 ? 1 : -1;
      const visited = new Set(), queue = [[r, c, 1.0]];
      while (queue.length) {
        const [cr, cc, s] = queue.shift();
        const k = cr * this.size + cc;
        if (visited.has(k)) continue; visited.add(k);
        if (this.board[cr][cc] !== 0 && !(cr===r && cc===c)) {
          if (this.board[cr][cc] !== this.board[r][c]) continue;
        }
        inf[cr][cc] += sign * s;
        if (s * 0.75 > 0.05) for (const [nr, nc] of this.neighbors(cr, cc)) {
          const nk = nr * this.size + nc;
          if (!visited.has(nk) && this.board[nr][nc] !== (3 - this.board[r][c]))
            queue.push([nr, nc, s * 0.75]);
        }
      }
    }
    return inf;
  }
  estimateScore(komi = 6.5) {
    const inf = this.calculateInfluence();
    let b = 0, w = 0;
    for (let r = 0; r < this.size; r++) for (let c = 0; c < this.size; c++) {
      const v = inf[r][c];
      if (this.board[r][c] === 1) b++;
      else if (this.board[r][c] === 2) w++;
      else if (v > 0.3) b++;
      else if (v < -0.3) w++;
    }
    return { black: b + this.captured[0], white: w + this.captured[1] + komi };
  }
  getValidMoves(color) {
    const m = [];
    for (let r = 0; r < this.size; r++) for (let c = 0; c < this.size; c++)
      if (this.isValidMove(r, c, color)) m.push([r, c]);
    return m;
  }
}

// ═══════════════════════════════════════════════════════
// AI ENGINE  —  三档真实差距
//   easy   : 开局库 + 战术优先 + MCTS（9×9:1000 / 13×13:500 / 19×19:200）≈业余15-20级
//   medium : 开局库 + 战术优先 + MCTS（9×9:5000 / 13×13:2200 / 19×19:500）≈业余8-12级
//   hard   : 开局库 + 战术优先 + MCTS（9×9:12000/ 13×13:5000 / 19×19:1200）≈业余3-6级
//            （19×19 进阶/挑战由 KataGo 神经网络接管，约业余1-2段）
// 核心优化：rollout 不调用 getValidMoves()，
//   改用「上一手相邻检测」O(4) 快速找提子/逃气，
//   再随机采样 12 格，彻底消除 O(N²) 瓶颈。
// ═══════════════════════════════════════════════════════
class GoAI {
  constructor(diff) { this.diff = diff; }

  getBestMove(game, color) {
    const allMoves = game.getValidMoves(color);
    if (!allMoves.length) return null;

    // ── 开局库（所有难度）──
    const op = this._openingMove(game, color);
    if (op) return op;

    // ── 所有难度：先做即时战术判断，再 MCTS ──
    const cap = this._findBestCapture(game, color, allMoves);
    if (cap) return cap;

    const esc = this._findEscape(game, color, allMoves);
    if (esc) return esc;

    const cands = this._getCandidates(game, color, allMoves);
    // MCTS fallback：神经网络不可用时的兜底
    // 13×19 大幅加强，与神经网络版本差距尽量缩小
    const simTable = {
      hard:   { 9: 12000, 13: 10000, 19: 4000 },
      medium: { 9: 5000,  13: 4000,  19: 1500 },
      easy:   { 9: 1000,  13: 500,   19: 200  },
    };
    const N = (simTable[this.diff] || {})[game.size] || 200;
    return this._mcts(game, color, cands, N);
  }

  // ── 开局库：前几手走星位 ──
  _openingMove(game, color) {
    const tbl = {
      9:  { max:3,  pts:[[2,2],[2,6],[6,2],[6,6],[4,4],[2,4],[4,2],[4,6],[6,4]] },
      13: { max:5,  pts:[[3,3],[3,9],[9,3],[9,9],[6,6],[3,6],[6,3],[6,9],[9,6]] },
      19: { max:7,  pts:[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15],[3,6],[6,3],[6,15],[15,6]] },
    }[game.size];
    if (!tbl || game.moveCount >= tbl.max) return null;
    for (const [r,c] of this._shuffle(tbl.pts))
      if (game.isValidMove(r, c, color)) return [r, c];
    return null;
  }

  // ── 入门：启发式，不用 MCTS ──
  _easyMove(game, color, moves) {
    const cap = this._findBestCapture(game, color, moves);
    if (cap) return cap;
    if (Math.random() < 0.65) {
      const esc = this._findEscape(game, color, moves);
      if (esc) return esc;
    }
    if (Math.random() < 0.45) {
      const atari = this._findAtari(game, color, moves);
      if (atari) return atari;
    }
    // 安全的中心偏向随机
    const center = (game.size - 1) / 2;
    const safe = moves.filter(([r,c]) => {
      const sim = game.clone(); sim.board[r][c] = color;
      const g = sim.getGroup(r, c); return g && g.liberties.length >= 2;
    });
    const pool = safe.length ? safe : moves;
    pool.sort(() => Math.random() - 0.5);
    return pool.slice(0, Math.max(1, Math.ceil(pool.length * 0.35)))
      .reduce((best, [r,c]) => {
        const s = -(Math.abs(r-center)+Math.abs(c-center))*0.1 + Math.random()*0.6;
        return s > best.s ? {m:[r,c],s} : best;
      }, {m:pool[0], s:-Infinity}).m;
  }

  // ══════════════════════════════════════════════════════
  // UCB1 + RAVE  Monte-Carlo Tree Search
  // ══════════════════════════════════════════════════════
  _mcts(game, color, cands, N) {
    if (!cands) cands = game.getValidMoves(color);
    if (!cands.length) return null;
    const n = cands.length;
    const wins      = new Float64Array(n);
    const plays     = new Float64Array(n);
    const amafWins  = new Float64Array(n);
    const amafPlays = new Float64Array(n);
    const C = 1.414, RAVE_K = 300;

    // move → candidate index（RAVE 需要）
    const moveIdx = new Map();
    cands.forEach(([r,c], i) => moveIdx.set(r * game.size + c, i));

    for (let sim = 0; sim < N; sim++) {
      // UCB1 + RAVE 选择
      let bestIdx = 0, bestVal = -Infinity;
      const logTotal = Math.log(sim + 1 + n);
      for (let j = 0; j < n; j++) {
        const p = plays[j], ap = amafPlays[j];
        const q  = p  > 0 ? wins[j]     / p  : 0;
        const aq = ap > 0 ? amafWins[j] / ap : 0;
        const beta = Math.sqrt(RAVE_K / (3 * p + RAVE_K));
        const combined = (1 - beta) * q + beta * aq;
        const val = p === 0
          ? 1e9 + Math.random()
          : combined + C * Math.sqrt(logTotal / p);
        if (val > bestVal) { bestVal = val; bestIdx = j; }
      }

      const [mr, mc] = cands[bestIdx];
      const g = game.clone();
      if (!g.placeStone(mr, mc)) { plays[bestIdx]++; continue; }

      const { result, played } = this._rollout(g, color, [mr, mc]);
      wins[bestIdx]  += result;
      plays[bestIdx] += 1;

      // RAVE 更新：把 rollout 中所有手的结果也记入对应候选
      for (const [r, c] of played) {
        const idx = moveIdx.get(r * game.size + c);
        if (idx !== undefined) {
          amafWins[idx]  += result;
          amafPlays[idx] += 1;
        }
      }
    }

    // 按胜率选最优手
    let best = cands[0], bestRate = -1;
    for (let j = 0; j < n; j++) {
      if (!plays[j]) continue;
      const rate = wins[j] / plays[j];
      if (rate > bestRate) { bestRate = rate; best = cands[j]; }
    }
    return best;
  }

  // ══════════════════════════════════════════════════════
  // 快速 Rollout
  // 关键：不调用 getValidMoves()，改用「上一手相邻」O(4)
  // 检测打吃/提子机会，随机采样 12 格处理其它情况。
  // ══════════════════════════════════════════════════════
  _rollout(game, origColor, firstMove) {
    const g = game.clone();
    const played = [];
    const maxDepth = g.size <= 9 ? 60 : g.size <= 13 ? 45 : 32;
    let passes = 0, lastMove = firstMove;

    for (let d = 0; d < maxDepth && passes < 2; d++) {
      const mv = this._fastMove(g, lastMove);
      if (mv && g.placeStone(mv[0], mv[1])) {
        played.push(mv);
        lastMove = mv;
        passes = 0;
      } else {
        g.pass();
        lastMove = null;
        passes++;
      }
    }

    const sc = g.estimateScore(6.5);
    const result = origColor === 1
      ? (sc.black > sc.white ? 1 : 0)
      : (sc.white > sc.black ? 1 : 0);
    return { result, played };
  }

  // 核心：快速选出一手 rollout 落子
  _fastMove(game, lastMove) {
    const color = game.currentPlayer, opp = 3 - color;
    const s = game.size;

    // ① 利用上一手：检查相邻棋串是否处于打吃
    if (lastMove) {
      const [lr, lc] = lastMove;
      // 对方相邻棋串只剩 1 气 → 我方去提
      for (const [nr, nc] of game.neighbors(lr, lc)) {
        if (game.board[nr][nc] !== opp) continue;
        const g = game.getGroup(nr, nc);
        if (g.liberties.length === 1) {
          const [cr, cc] = g.liberties[0];
          if (!this._isEye(game, cr, cc, color) && game.isValidMove(cr, cc, color))
            return [cr, cc];
        }
      }
      // 己方相邻棋串只剩 1 气 → 逃跑
      for (const [nr, nc] of game.neighbors(lr, lc)) {
        if (game.board[nr][nc] !== color) continue;
        const g = game.getGroup(nr, nc);
        if (g.liberties.length === 1) {
          const lib = g.liberties[0];
          if (!this._isEye(game, lib[0], lib[1], color) && game.isValidMove(lib[0], lib[1], color))
            return lib;
        }
      }
    }

    // ② 随机采样 12 格，跳过己方眼位，找到合法落点
    for (let t = 0; t < 12; t++) {
      const r = Math.floor(Math.random() * s);
      const c = Math.floor(Math.random() * s);
      if (game.board[r][c] !== 0) continue;
      if (game.koPoint && game.koPoint[0] === r && game.koPoint[1] === c) continue;
      if (this._isEye(game, r, c, color)) continue;
      // 快速气检查：有空邻居即合法（避免调用完整 isValidMove）
      let hasEmptyNb = false, wouldCap = false;
      for (const [nr, nc] of game.neighbors(r, c)) {
        if (game.board[nr][nc] === 0) { hasEmptyNb = true; break; }
        if (game.board[nr][nc] === opp) {
          const g = game.getGroup(nr, nc);
          if (g.liberties.length <= 1) { wouldCap = true; break; }
        }
      }
      if (hasEmptyNb || wouldCap) {
        if (game.isValidMove(r, c, color)) return [r, c];
      }
    }
    return null;
  }

  // 真眼判断：不填自己的眼
  _isEye(game, r, c, color) {
    if (game.board[r][c] !== 0) return false;
    const nb = game.neighbors(r, c);
    if (!nb.every(([nr, nc]) => game.board[nr][nc] === color)) return false;
    const opp = 3 - color;
    const diags = [[-1,-1],[-1,1],[1,-1],[1,1]]
      .map(([dr,dc]) => [r+dr, c+dc]).filter(([nr,nc]) => game.inBounds(nr, nc));
    return diags.filter(([nr,nc]) => game.board[nr][nc] === opp).length === 0;
  }

  // ══════════════════════════════════════════════════════
  // 候选手生成 + 评分
  // ══════════════════════════════════════════════════════
  _getCandidates(game, color, allMoves) {
    const maxN = this.diff === 'hard' ? 45 : 30;
    const pool = game.size >= 13 ? this._focusedMoves(game, color, allMoves) : allMoves;
    return pool.length <= maxN ? pool : this._scoreMoves(game, color, pool, maxN);
  }

  _scoreMoves(game, color, moves, maxN) {
    const opp = 3 - color, center = (game.size - 1) / 2;
    const scored = moves.map(([r, c]) => {
      let score = Math.random() * 0.15;
      // 邻近已有棋子的奖励
      for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
        const nr = r+dr, nc = c+dc;
        if (!game.inBounds(nr, nc) || !game.board[nr][nc]) continue;
        const dist = Math.max(1, Math.abs(dr)+Math.abs(dc));
        score += (game.board[nr][nc] === color ? 4 : 3) / dist;
      }
      // 开局中心/角偏好
      if (game.moveCount < 12)
        score += 2 / (Math.abs(r-center) + Math.abs(c-center) + 0.5);
      // 战术快速评估
      const sim = game.clone(); sim.board[r][c] = color;
      let capSize = 0;
      for (const [nr,nc] of sim.neighbors(r,c)) {
        if (sim.board[nr][nc] !== opp) continue;
        const g = sim.getGroup(nr,nc);
        if (g.liberties.length === 0) capSize += g.stones.length * 10;
        else if (g.liberties.length === 1) score += 5;
      }
      score += capSize;
      // 自己落子后气太少 → 扣分
      const myG = sim.getGroup(r, c);
      if (myG) {
        if (myG.liberties.length <= 1) score -= 9;
        else if (myG.liberties.length === 2) score -= 1.5;
      }
      // 填眼 → 大扣分
      if (this._isEye(game, r, c, color)) score -= 15;
      return { m:[r,c], score };
    });
    scored.sort((a,b) => b.score - a.score);
    return scored.slice(0, maxN).map(x => x.m);
  }

  _focusedMoves(game, color, allMoves) {
    const focus = new Set(), s = game.size;
    for (const [sr,sc] of this._starPts(s))
      if (game.board[sr][sc] === 0) focus.add(sr*100+sc);
    for (let r = 0; r < s; r++) for (let c = 0; c < s; c++) {
      if (!game.board[r][c]) continue;
      for (let dr = -3; dr <= 3; dr++) for (let dc = -3; dc <= 3; dc++) {
        if (Math.abs(dr)+Math.abs(dc) > 4) continue;
        const nr = r+dr, nc = c+dc;
        if (nr>=0&&nr<s&&nc>=0&&nc<s&&game.board[nr][nc]===0) focus.add(nr*100+nc);
      }
    }
    const result = [...focus].map(k=>[Math.floor(k/100),k%100])
      .filter(([r,c])=>game.isValidMove(r,c,color));
    if (result.length < 5) {
      const ctr = Math.floor(s/2);
      [[ctr,ctr],[ctr-2,ctr-2],[ctr+2,ctr+2],[ctr-2,ctr+2],[ctr+2,ctr-2]].forEach(([r,c])=>{
        if (r>=0&&r<s&&c>=0&&c<s&&game.isValidMove(r,c,color)) result.push([r,c]);
      });
    }
    return result.length ? result : allMoves.slice(0, 80);
  }

  _starPts(size) {
    if (size===9)  return [[2,2],[2,4],[2,6],[4,2],[4,4],[4,6],[6,2],[6,4],[6,6]];
    if (size===13) return [[3,3],[3,6],[3,9],[6,3],[6,6],[6,9],[9,3],[9,6],[9,9]];
    if (size===19) return [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
    return [];
  }

  // ── 战术工具方法 ──
  _findBestCapture(game, color, moves) {
    const opp = 3 - color; let best = null, bestSz = 0;
    for (const [r,c] of moves) {
      const sim = game.clone(); sim.board[r][c] = color; let sz = 0;
      for (const [nr,nc] of sim.neighbors(r,c)) {
        if (sim.board[nr][nc] === opp) {
          const g = sim.getGroup(nr,nc);
          if (g.liberties.length === 0) sz += g.stones.length;
        }
      }
      if (sz > bestSz) { bestSz = sz; best = [r,c]; }
    }
    return bestSz > 0 ? best : null;
  }

  _findEscape(game, color, moves) {
    const seen = new Set();
    for (let r = 0; r < game.size; r++) for (let c = 0; c < game.size; c++) {
      if (game.board[r][c] !== color) continue;
      const k = r*game.size+c; if (seen.has(k)) continue;
      const g = game.getGroup(r,c);
      g.stones.forEach(([sr,sc])=>seen.add(sr*game.size+sc));
      if (g.liberties.length !== 1) continue;
      for (const [mr,mc] of moves) {
        const sim = game.clone(); if (!sim.placeStone(mr,mc)) continue;
        const [sr,sc] = g.stones[0];
        if (sim.board[sr][sc] === color) {
          const ng = sim.getGroup(sr,sc);
          if (ng && ng.liberties.length >= 2) return [mr,mc];
        }
      }
    }
    return null;
  }

  _findAtari(game, color, moves) {
    const opp = 3 - color;
    for (const [r,c] of this._shuffle(moves)) {
      const sim = game.clone(); sim.board[r][c] = color;
      for (const [nr,nc] of sim.neighbors(r,c))
        if (sim.board[nr][nc]===opp && sim.getGroup(nr,nc).liberties.length===1) return [r,c];
    }
    return null;
  }

  _shuffle(a) {
    const b=[...a];
    for (let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
    return b;
  }
}

// ═══════════════════════════════════════════════════════
// 关卡专用 ConceptAI（5章节概念驱动行为）
// ═══════════════════════════════════════════════════════
class ConceptAI extends GoAI {
  constructor(chapterIdx, passivity = 0) {
    super('easy');
    this.chapterIdx = chapterIdx; // 0~4
    this.passivity  = passivity;  // 0=正常，1=完全随机
  }

  getBestMove(game, color) {
    const moves = game.getValidMoves(color);
    if (!moves.length) return null;

    // passivity决定随机比例
    if (Math.random() < this.passivity) return moves[Math.floor(Math.random() * moves.length)];

    switch (this.chapterIdx) {
      // 第一章：棋盘与落子 → 完全随机，让玩家自由体验落子
      case 0:
        return moves[Math.floor(Math.random() * moves.length)];

      // 第二章：气与提子 → 会提子，其余随机；让玩家学习气与提子
      case 1: {
        const cap = this._findBestCapture(game, color, moves);
        if (cap && Math.random() < 0.7) return cap;
        return moves[Math.floor(Math.random() * moves.length)];
      }

      // 第三章：眼与死活 → 会提子、尝试聚集自己的棋子形成眼；较被动
      case 2: {
        const cap = this._findBestCapture(game, color, moves);
        if (cap && Math.random() < 0.5) return cap;
        return this.groupClusterMove(game, color, moves);
      }

      // 第四章：吃子技巧 → 完整战术（提子→逃气→打吃），教玩家练习征子/网
      case 3: {
        const cap = this._findBestCapture(game, color, moves);
        if (cap) return cap;
        const esc = this._findEscape(game, color, moves);
        if (esc && Math.random() < 0.8) return esc;
        const atari = this._findAtari(game, color, moves);
        if (atari && Math.random() < 0.65) return atari;
        const ctr = (game.size-1)/2;
        return moves.map(([r,c])=>({m:[r,c],s:-(Math.abs(r-ctr)+Math.abs(c-ctr))*0.08+Math.random()*0.5})).sort((a,b)=>b.s-a.s)[0].m;
      }

      // 第五章：势与领地 → 根据势力分布争地，有一定计算能力
      case 4: {
        const cap = this._findBestCapture(game, color, moves);
        if (cap) return cap;
        const esc = this._findEscape(game, color, moves);
        if (esc) return esc;
        const atari = this._findAtari(game, color, moves);
        if (atari && Math.random() < 0.5) return atari;
        return this.territoryMove(game, color, moves);
      }

      default:
        return moves[Math.floor(Math.random() * moves.length)];
    }
  }

  // 聚集落子：优先落在自己棋子附近，促进棋串形成（眼章节）
  groupClusterMove(game, color, moves) {
    const near = moves.filter(([r, c]) =>
      game.neighbors(r, c).some(([nr, nc]) => game.board[nr][nc] === color)
    );
    const pool = near.length ? near : moves;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // 势力落子：在势力薄弱区域落子争地（势章节）
  territoryMove(game, color, moves) {
    const inf = game.calculateInfluence();
    const opp = 3 - color;
    const scored = moves.map(([r, c]) => {
      // 黑方(1)喜欢蓝色(inf>0)区域附近争夺，白方(2)喜欢红色(inf<0)
      const v = color === 1 ? -inf[r][c] : inf[r][c];
      return { m: [r, c], score: v + Math.random() * 0.4 };
    });
    scored.sort((a, b) => b.score - a.score);
    return scored[0].m;
  }
}

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
class BoardRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.showInfluence = false;
    this.highlights = [];
    this.lastMove = null;
    this.hover = null;
    this.hoverColor = 1;
  }
  setup(size) {
    this.size = size;
    const dpr = window.devicePixelRatio || 1;
    const isMobile = window.innerWidth <= 700 || window.matchMedia('(pointer:coarse)').matches;
    const maxPx = isMobile
      ? Math.min(window.innerWidth - 8, window.innerHeight - 240, 600)
      : Math.min(window.innerWidth - 300, window.innerHeight - 50, 600);
    const px = Math.max(220, maxPx);
    this.pad = Math.round(px / (size + 1.5));
    this.cell = Math.round((px - this.pad * 2) / (size - 1));
    const total = this.pad * 2 + this.cell * (size - 1);
    this.canvas.style.width = total + 'px';
    this.canvas.style.height = total + 'px';
    this.canvas.width = total * dpr;
    this.canvas.height = total * dpr;
    this.ctx.scale(dpr, dpr);
    this.sr = this.cell * 0.465;
    this._css = total; // CSS size for coordinate calc
  }
  pt(r, c) { return { x: this.pad + c*this.cell, y: this.pad + r*this.cell }; }

  draw(game) {
    const ctx = this.ctx, s = this.size, W = this._css;
    ctx.clearRect(0, 0, W, W);

    // ── 棋盘底色（干净平面，类 goproblems.com）
    ctx.fillStyle = '#DCB468';
    ctx.fillRect(0, 0, W, W);
    // 轻微内阴影边框
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, W-2, W-2);

    // ── 势力图（落在格线下方）
    if (this.showInfluence) {
      const inf = game.calculateInfluence();
      for (let r = 0; r < s; r++) for (let c = 0; c < s; c++) {
        const v = inf[r][c]; if (Math.abs(v) < 0.1) continue;
        const {x,y} = this.pt(r,c);
        const alpha = Math.min(Math.abs(v)*0.38, 0.55);
        const gr = ctx.createRadialGradient(x,y,0,x,y,this.cell*.62);
        if (v > 0) { gr.addColorStop(0,`rgba(30,60,200,${alpha})`); gr.addColorStop(1,'rgba(30,60,200,0)'); }
        else { gr.addColorStop(0,`rgba(210,40,40,${alpha})`); gr.addColorStop(1,'rgba(210,40,40,0)'); }
        ctx.fillStyle = gr;
        ctx.beginPath(); ctx.arc(x,y,this.cell*.62,0,Math.PI*2); ctx.fill();
      }
    }

    // ── 格线
    ctx.strokeStyle = '#5a3200'; ctx.lineWidth = 1;
    for (let i = 0; i < s; i++) {
      const {x:x0,y:y0}=this.pt(i,0), {x:x1}=this.pt(i,s-1);
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y0); ctx.stroke();
      const {x:xa,y:ya}=this.pt(0,i), {y:yb}=this.pt(s-1,i);
      ctx.beginPath(); ctx.moveTo(xa,ya); ctx.lineTo(xa,yb); ctx.stroke();
    }

    // ── 星位（实心圆点）
    ctx.fillStyle = '#3a1e00';
    for (const [sr,sc] of this.starPoints(s)) {
      const {x,y} = this.pt(sr,sc);
      ctx.beginPath(); ctx.arc(x,y,Math.max(3, this.cell*.1),0,Math.PI*2); ctx.fill();
    }

    // ── 高亮提示
    for (const {r,c,type} of this.highlights) {
      const {x,y} = this.pt(r,c);
      if (type === 'lib') {
        ctx.fillStyle = 'rgba(60,180,255,.32)';
        ctx.beginPath(); ctx.arc(x,y,this.sr*.6,0,Math.PI*2); ctx.fill();
      } else if (type === 'atari') {
        ctx.strokeStyle = 'rgba(230,50,50,.9)'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(x,y,this.sr*.85,0,Math.PI*2); ctx.stroke();
      } else if (type === 'target') {
        ctx.strokeStyle = 'rgba(50,220,90,.95)'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(x,y,this.sr*.85,0,Math.PI*2); ctx.stroke();
      }
    }

    // ── 悬停预览
    if (this.hover && game.board[this.hover.r][this.hover.c] === 0) {
      const {x,y} = this.pt(this.hover.r,this.hover.c);
      ctx.globalAlpha = 0.42;
      this.drawStone(ctx,x,y,this.hoverColor);
      ctx.globalAlpha = 1;
    }

    // ── 棋子
    for (let r = 0; r < s; r++) for (let c = 0; c < s; c++) {
      if (!game.board[r][c]) continue;
      const {x,y} = this.pt(r,c); this.drawStone(ctx,x,y,game.board[r][c]);
    }

    // ── 最后一手标记
    if (this.lastMove) {
      const [lr,lc] = this.lastMove;
      if (game.board[lr][lc]) {
        const {x,y} = this.pt(lr,lc);
        const col = game.board[lr][lc];
        ctx.strokeStyle = col===1 ? 'rgba(255,255,255,.9)' : 'rgba(0,0,0,.7)';
        ctx.lineWidth = 1.5;
        const mr = Math.max(2, this.sr*.28);
        ctx.beginPath(); ctx.arc(x,y,mr,0,Math.PI*2); ctx.stroke();
      }
    }
  }

  drawStone(ctx, x, y, color) {
    const r = this.sr;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    if (color === 1) {
      // 黑子：深色基底 + 左上反光
      const g = ctx.createRadialGradient(x-r*.3, y-r*.3, r*.02, x+r*.1, y+r*.1, r*1.1);
      g.addColorStop(0, '#686868');
      g.addColorStop(0.25, '#1c1c1c');
      g.addColorStop(1, '#050505');
      ctx.fillStyle = g; ctx.fill();
      // 左上高光点
      const hl = ctx.createRadialGradient(x-r*.32, y-r*.35, 0, x-r*.22, y-r*.25, r*.42);
      hl.addColorStop(0, 'rgba(255,255,255,.32)');
      hl.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hl; ctx.fill();
    } else {
      // 白子：轻阴影 + 左上高光
      ctx.shadowColor = 'rgba(0,0,0,.45)';
      ctx.shadowBlur = Math.max(3, r*.18);
      ctx.shadowOffsetX = r*.12; ctx.shadowOffsetY = r*.14;
      const g = ctx.createRadialGradient(x-r*.28, y-r*.3, r*.02, x+r*.08, y+r*.08, r*1.05);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.55, '#eeebe4');
      g.addColorStop(1, '#d0c8b8');
      ctx.fillStyle = g; ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      // 左上高光
      const hl = ctx.createRadialGradient(x-r*.3, y-r*.34, 0, x-r*.2, y-r*.22, r*.4);
      hl.addColorStop(0, 'rgba(255,255,255,.7)');
      hl.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hl;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  }

  starPoints(size) {
    if (size===9) return [[2,2],[2,4],[2,6],[4,2],[4,4],[4,6],[6,2],[6,4],[6,6]];
    if (size===13) return [[3,3],[3,9],[6,6],[9,3],[9,9]];
    if (size===19) return [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
    if (size===5) return [[2,2]]; return [];
  }

  getIntersection(cx, cy) {
    const rect = this.canvas.getBoundingClientRect();
    // Use CSS pixel coordinates (canvas is scaled by dpr but style size is CSS px)
    const x = (cx - rect.left) * (this._css / rect.width);
    const y = (cy - rect.top)  * (this._css / rect.height);
    const c = Math.round((x - this.pad) / this.cell);
    const r = Math.round((y - this.pad) / this.cell);
    if (r < 0 || r >= this.size || c < 0 || c >= this.size) return null;
    return [r, c];
  }
}

// ─── GTP 坐标转换（列字母跳过 I）────────────────────────
const _GTP_COLS = 'ABCDEFGHJKLMNOPQRST';
function toGTP(row, col, boardSize) {
  return _GTP_COLS[col] + (boardSize - row);
}
function fromGTP(gtp, boardSize) {
  const col = _GTP_COLS.indexOf(gtp[0].toUpperCase());
  const row = boardSize - parseInt(gtp.slice(1));
  return [row, col];
}

// AI 认输标记（区别于 pass/null）
const AI_RESIGN = Symbol('resign');

// ═══════════════════════════════════════════════════════
// BrowserKataGoAI — TF.js 浏览器端神经网络 AI
// 加载 KataGo b10c128 模型，约业余 2 段棋力
// 完全在浏览器本地运行，不依赖任何服务器
// ═══════════════════════════════════════════════════════
class BrowserKataGoAI {
  constructor(diff, fallback) {
    this.diff     = diff;
    this.fallback = fallback;
    this.model       = null;
    this.tf          = null;
    this.modelReady  = false;
    this.modelLoading= false;
    this.modelFailed = false;
    this.modelError  = null;
    this._resignConsec = 0;
  }

  // ── TF.js ────────────────────────────────────────────
  async _loadTF() {
    if (window.tf) { this.tf = window.tf; return; }
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('TF.js 加载失败'));
      document.head.appendChild(s);
    });
    this.tf = window.tf;
  }

  // ── 加载模型 ─────────────────────────────────────────
  // 依次尝试多个 CDN 源，任一成功即停止
  async _ensureModel() {
    if (this.modelReady)  return true;
    if (this.modelFailed) return false;
    if (this.modelLoading) {
      while (this.modelLoading) await new Promise(r => setTimeout(r, 80));
      return this.modelReady;
    }
    this.modelLoading = true;
    try {
      await this._loadTF();
      const tf = this.tf;
      const IDB  = 'indexeddb://katago-b10c128-v5';
      const BASE = 'b10c128-s1141046784-d204142634';
      // 多个备用源，按可用性排序
      const URLS = [
        `https://raw.githubusercontent.com/maksimKorzh/kata-model-js/main/model/${BASE}/model.json`,
        `https://cdn.jsdelivr.net/gh/maksimKorzh/kata-model-js@main/model/${BASE}/model.json`,
        `https://ghproxy.com/https://raw.githubusercontent.com/maksimKorzh/kata-model-js/main/model/${BASE}/model.json`,
      ];

      // 1. 尝试从 IndexedDB 缓存加载
      let cached = false;
      try {
        this.model = await tf.loadGraphModel(IDB);
        cached = true;
        console.log('[KataGo] 从缓存加载成功');
      } catch(_) {}

      // 2. 缓存未命中，逐一尝试远程 URL
      if (!cached) {
        let lastErr = null;
        for (const url of URLS) {
          try {
            console.log('[KataGo] 尝试:', url);
            // 先检测 model.json 是否可达（超时 8 秒）
            const probe = await Promise.race([
              fetch(url, { method: 'HEAD' }),
              new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000)),
            ]);
            if (!probe.ok) { console.warn('[KataGo] HEAD失败:', probe.status, url); continue; }
            this.model = await tf.loadGraphModel(url);
            try { await this.model.save(IDB); } catch(_) {}
            console.log('[KataGo] 从远程加载成功:', url);
            break;
          } catch(e) {
            lastErr = e;
            console.warn('[KataGo] 源失败:', url, e.message);
          }
        }
        if (!this.model) throw lastErr || new Error('所有模型源均不可用');
      }

      console.log('KataGo 输入:', (this.model.inputs||[]).map(x=>x.name+' '+JSON.stringify(x.shape)));
      console.log('KataGo 输出:', (this.model.outputs||[]).map(x=>x.name+' '+JSON.stringify(x.shape)));

      this.modelReady = true;
      return true;
    } catch(e) {
      this.modelError = e.message;
      console.error('KataGo 加载失败:', e);
      this.modelFailed = true;
      return false;
    } finally {
      this.modelLoading = false;
    }
  }

  // ── 气数表 ───────────────────────────────────────────
  // boardEdge: 实际棋盘边长（9/13/19），用于截断棋盘外的"空点"不算气
  _libertyMap(board, M, boardEdge) {
    const E = boardEdge || M;   // 实际棋盘边界
    const lmap = Array.from({length:M}, ()=>new Int8Array(M));
    const done = new Uint8Array(M*M);
    const nb = (r,c) => [[-1,0],[1,0],[0,-1],[0,1]]
      .map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>nr>=0&&nr<E&&nc>=0&&nc<E);
    const group = (r,c) => {
      const col=board[r][c]; if(!col) return {stones:[],liberties:[]};
      const vis=new Set(),st=[],lib=new Set(),q=[[r,c]];
      while(q.length){const[cr,cc]=q.pop();const k=cr*E+cc;
        if(vis.has(k))continue;vis.add(k);st.push([cr,cc]);
        for(const[nr,nc]of nb(cr,cc)){
          if(board[nr][nc]===0)lib.add(nr*E+nc);
          else if(board[nr][nc]===col)q.push([nr,nc]);
        }
      }
      return{stones:st,liberties:[...lib].map(k=>[Math.floor(k/E),k%E])};
    };
    for(let r=0;r<E;r++)for(let c=0;c<E;c++){
      const k=r*E+c;if(!board[r][c]||done[k])continue;
      const g=group(r,c),libs=Math.min(g.liberties.length,4);
      for(const[gr,gc]of g.stones){lmap[gr][gc]=libs;done[gr*E+gc]=1;}
    }
    return lmap;
  }

  // ── 构建输入张量 ─────────────────────────────────────
  // 模型期望: bin=[1,361,22]  glob=[1,19]  (19×19 flattened, channels-last)
  //
  // KataGo 多尺寸编码规范（b10c128 支持 9/13/19）：
  //   1. 小棋盘放左上角（off=0），不居中
  //   2. ch21(bias)=1 仅限棋盘内位置，棋盘外全 0
  //   3. 气数通道 2-5 / 6-9 累积（l>=1 l>=2 l>=3 l>=4），模型实测有效
  //   4. 全局特征 g[2/3] 编码棋盘尺寸：(N-19)/10
  _buildInputs(game, color) {
    const tf = this.tf;
    const M  = 19;
    const N  = game.size;
    // 左上角放置（KataGo 标准），不再居中
    const off = 0;

    // 只填 NxN 区域，其余保持 0（off-board）
    const emb = Array.from({length:M}, ()=>new Int8Array(M));
    for(let r=0;r<N;r++) for(let c=0;c<N;c++)
      emb[r][c] = game.board[r][c];

    // 传入实际棋盘边长，避免棋盘外空点被误算为气
    const lmap = this._libertyMap(emb, M, N);
    const opp  = 3 - color;
    const koR  = game.koPoint ? game.koPoint[0] : -1;
    const koC  = game.koPoint ? game.koPoint[1] : -1;

    const bin = new Float32Array(M*M*22);
    const B   = (pos, ch) => pos*22+ch;

    for(let r=0;r<M;r++) for(let c=0;c<M;c++) {
      const pos = r*M+c;
      // 棋盘外：所有特征包括 bias 保持 0
      if(r >= N || c >= N) continue;

      // ch21: bias（仅棋盘内=1，让模型识别边界）
      bin[B(pos,21)] = 1;

      const cell = emb[r][c];
      if(cell===color) {
        bin[B(pos,0)] = 1;
        const l = lmap[r][c];
        if(l>=1)bin[B(pos,2)]=1; if(l>=2)bin[B(pos,3)]=1;
        if(l>=3)bin[B(pos,4)]=1; if(l>=4)bin[B(pos,5)]=1;
      } else if(cell===opp) {
        bin[B(pos,1)] = 1;
        const l = lmap[r][c];
        if(l>=1)bin[B(pos,6)]=1; if(l>=2)bin[B(pos,7)]=1;
        if(l>=3)bin[B(pos,8)]=1; if(l>=4)bin[B(pos,9)]=1;
      }
      if(r===koR && c===koC) bin[B(pos,10)] = 1;
    }

    // 历史落子 planes 11-15 (mine), 16-20 (opp)
    const myC=color===1?'B':'W', opC=color===1?'W':'B';
    let mi=0, oi=0;
    for(let h=battleMoveHistory.length-1;h>=0;h--) {
      if(mi>=5&&oi>=5) break;
      const mv=battleMoveHistory[h];
      if(mv.pos==='pass') continue;
      try {
        const[mr,mc]=fromGTP(mv.pos,N);
        if(mr>=0&&mr<N&&mc>=0&&mc<N) {
          const pos=mr*M+mc;   // 左上角，无 off 偏移
          if(mv.color===myC&&mi<5){bin[B(pos,11+mi)]=1;mi++;}
          else if(mv.color===opC&&oi<5){bin[B(pos,16+oi)]=1;oi++;}
        }
      } catch(_) {}
    }

    // glob: [1, 19]
    const g = new Float32Array(19);
    g[0] = 6.5/15.0;            // komi 归一化（模型实测有效值）
    g[1] = color===2 ? 1 : 0;  // 白棋视角
    g[2] = (N - 19) / 10.0;    // 棋盘宽（19×19=0, 9×9=-1.0）
    g[3] = (N - 19) / 10.0;    // 棋盘高

    return {
      binT: tf.tensor3d(bin, [1, M*M, 22]),
      glbT: tf.tensor2d(g,  [1, 19]),
      off, M, N,
    };
  }

  // ── 推理 ─────────────────────────────────────────────
  // 模型含动态分支，必须用 executeAsync 而非 predict
  //
  // 已确认的模型输出顺序（缓存加载 b10c128）：
  //   [0] ownership_output  shape=[1,19,19]  size=361
  //   [1] policy_output     shape=[1,2,362]  size=724  ← 需要这个（双头 channel-first）
  //   [2] miscvalues_output shape=[1,10]     size=10
  //   [3] value_output      shape=[1,3]      size=3
  //
  // 识别策略：
  //   1. 用 shape 精确匹配（最可靠）：最后一维==362 → policy；总元素==3 → value
  //   2. Shape 缺失时退回 size 匹配
  async _runInference(game, color) {
    const { binT, glbT, M, N } = this._buildInputs(game, color);

    let allOuts;
    try {
      allOuts = await this.model.executeAsync(
        { 'swa_model/bin_inputs': binT, 'swa_model/global_inputs': glbT }
      );
    } finally {
      binT.dispose(); glbT.dispose();
    }

    const outsArr = Array.isArray(allOuts) ? allOuts : [allOuts];

    // ① 保存 shape 并读取数据（shape 必须在 dispose 前保存）
    const meta = outsArr.map(t => ({
      sz:    t.size,
      shape: t.shape ? [...t.shape] : null,
      lastDim: t.shape ? t.shape[t.shape.length - 1] : null,
    }));
    const allData = [];
    for (const t of outsArr) {
      allData.push(await t.data());
      t.dispose();
    }

    console.log('[KataGo] outputs:', meta.map((m,i)=>`[${i}]sz=${m.sz},shape=${JSON.stringify(m.shape)}`).join(' | '));

    if (allData.length < 1) throw new Error('模型无输出');

    // ② 用 shape 精确定位 policy 和 value
    //    policy：最后一维 = 362 (= 361 board positions + 1 pass)
    //    value：总元素数 = 2 或 3
    let policyIdx = -1, valueIdx = -1;

    // shape-based detection（最可靠）
    for (let i = 0; i < meta.length; i++) {
      if (meta[i].lastDim === 362) { policyIdx = i; break; }
    }
    for (let i = 0; i < meta.length; i++) {
      if (meta[i].sz <= 4) { valueIdx = i; break; }
    }

    // size-based fallback：policy size 是 362 或 724（362×2）
    if (policyIdx === -1) {
      for (let i = 0; i < allData.length; i++) {
        const len = allData[i].length;
        if (len === 362 || len === 724 || len === 361) { policyIdx = i; break; }
      }
    }
    // value fallback：size 最小的张量（排除已找到的 policy）
    if (valueIdx === -1) {
      let minSz = Infinity, minIdx = -1;
      for (let i = 0; i < allData.length; i++) {
        if (i === policyIdx) continue;
        if (allData[i].length < minSz) { minSz = allData[i].length; minIdx = i; }
      }
      if (minSz <= 10) valueIdx = minIdx;
    }

    if (policyIdx === -1) throw new Error('未找到 policy 输出（尝试过 shape 和 size 匹配均失败）');

    const pFull = allData[policyIdx];
    const pShape = meta[policyIdx].shape;  // e.g. [1,2,362] or [1,362] or [1,361]
    const boardSq = M * M;  // 361

    // ③ 确定 stride 和 headOffset
    //    shape=[1,2,362] → channel-first 双头
    //      head0(idx 0..361)   = 黑棋 policy（白棋回合时被屏蔽为 -5000）
    //      head1(idx 362..723) = 白棋 policy（白棋回合时有效）
    //    → 通过比较两头的最大值自动选取有效头（有效头最大值 >> -5000）
    //    shape=[1,362,2] → channel-last，stride=2
    //    shape=[1,362] / [1,361] → 单头，headOffset=0，stride=1
    let stride = 1;
    let headOffset = 0;  // 起始索引：0=头0，362=头1

    if (pShape && pShape.length >= 3) {
      const channels  = pShape[pShape.length - 2];  // e.g. 2
      const positions = pShape[pShape.length - 1];  // e.g. 362

      if (channels > 1 && positions === 362) {
        // channel-first 双头 [batch, channels, positions]
        stride = 1;
        const half = positions;  // 362
        // 用"被 mask 比例"选有效头：被屏蔽的头几乎所有值 < -100
        let masked0 = 0, masked1 = 0;
        let max0 = -Infinity, max1 = -Infinity;
        for (let j = 0;    j < half;         j++) { if (pFull[j] < -100) masked0++; if (pFull[j] > max0) max0 = pFull[j]; }
        for (let j = half; j < pFull.length; j++) { if (pFull[j] < -100) masked1++; if (pFull[j] > max1) max1 = pFull[j]; }
        // 被 mask 比例低的头才是当前颜色的有效策略
        headOffset = (masked1 < masked0) ? half : 0;
        console.log('[KataGo] head0 max=', max0.toFixed(1), 'masked=', masked0,
                    '| head1 max=', max1.toFixed(1), 'masked=', masked1,
                    '→ using head', headOffset === 0 ? 0 : 1);
      } else if (positions > 1 && channels === 362) {
        // channel-last [batch, positions, channels]
        stride = positions;
        headOffset = 0;
      }
    } else if (!pShape && pFull.length >= 700) {
      // shape 不可用：同样用 mask 比例选头
      stride = 1;
      const half = Math.floor(pFull.length / 2);
      let masked0 = 0, masked1 = 0;
      for (let j = 0;    j < half;         j++) if (pFull[j] < -100) masked0++;
      for (let j = half; j < pFull.length; j++) if (pFull[j] < -100) masked1++;
      headOffset = (masked1 < masked0) ? half : 0;
    }

    // ④ 计算 winProb
    // KataGo value_output shape=[1,3]：[win_black, win_white, draw]（raw logits）
    // 若已经是概率（值在 0-1 且 sum≈1），直接用；否则先做 softmax
    let winProb = null;
    if (valueIdx !== -1) {
      const v = Array.from(allData[valueIdx]);
      let probs;
      const sum0 = v.reduce((a,b) => a+b, 0);
      if (sum0 > 0.5 && sum0 < 1.5 && v.every(x => x >= 0)) {
        // 已经是概率
        probs = v;
      } else {
        // logit → softmax
        const vmax = Math.max(...v);
        const exps = v.map(x => Math.exp(x - vmax));
        const s    = exps.reduce((a,b) => a+b, 0);
        probs = exps.map(x => x/s);
      }
      // probs[0]=黑赢, probs[1]=白赢; 若 color=2(白)则反转视角
      const winBlack = probs[0];
      winProb = color === 2 ? (1 - winBlack) * 2 - 1 : winBlack * 2 - 1;
      console.log('[KataGo] value raw=', v.map(x=>x.toFixed(2)), '→ winProb=', winProb.toFixed(3));
    }

    const sample6 = Array.from(pFull.slice(headOffset, headOffset + 6)).map(x=>x.toFixed(3));
    console.log('[KataGo] policyIdx=', policyIdx, 'headOffset=', headOffset,
                'len=', pFull.length, 'stride=', stride,
                'sample=', sample6, 'winProb=', winProb?.toFixed(3));

    // ⑤ 映射到实际棋盘坐标（左上角，无 offset）
    const policy = new Float32Array(N*N+1);
    for(let r=0;r<N;r++) for(let c=0;c<N;c++)
      policy[r*N+c] = pFull[headOffset + (r*M+c) * stride];
    const passIdx = headOffset + boardSq * stride;
    policy[N*N] = passIdx < pFull.length ? pFull[passIdx] : -Infinity;

    // ── 调试：打印 policy 最高的前5个落点，确认是否合理 ──
    // 正确的 KataGo policy 第一手应优先星位（如 (3,3)(3,15)(15,3)(15,15)）
    const top5 = Array.from({length: N*N}, (_,i) => ({r:Math.floor(i/N), c:i%N, v:policy[i]}))
      .sort((a,b) => b.v - a.v).slice(0, 5);
    console.log('[KataGo] top5:', top5.map(m=>`(${m.r},${m.c})=${m.v.toFixed(2)}`).join(' | '));

    return { policy, winProb };
  }

  // ── UI 徽章 ───────────────────────────────────────────
  _setBadge(text, color) {
    const el = document.getElementById('b-ai-badge');
    if(!el) return;
    el.style.display = 'block';
    el.style.color   = color || '#7777aa';
    el.textContent   = text;
  }

  // ── 主接口 ────────────────────────────────────────────
  // 所有棋盘尺寸均尝试 KataGo 神经网络（b10c128 支持 9/13/19 路）
  // 9×9：NN 筛选 Top-K 候选手 → 短 MCTS 验证（混合模式，规避小棋盘偶发失误）
  // 13×19：直接 NN 落子（与原 19×19 逻辑相同）
  // 模型加载失败：降级到高强度 MCTS
  async getBestMoveAsync(game, color, onStatus) {
    if(onStatus) onStatus('browser_loading');
    this._setBadge('⏳ 加载神经网络模型…', '#aaa');

    const ok = await this._ensureModel();
    if(!ok) {
      this._setBadge('⚙️ MCTS 深度搜索中…', '#5ba85b');
      if(onStatus) onStatus('local_mcts');
      await new Promise(r => setTimeout(r, 30));
      return this.fallback.getBestMove(game, color);
    }

    if(onStatus) onStatus('browser_thinking');

    try {
      const N = game.size;
      const { policy, winProb } = await this._runInference(game, color);

      const validMoves = game.getValidMoves(color);
      if(!validMoves.length) return null;

      // 认输判断：根据棋盘尺寸调整触发时机
      const resignThresh = N === 9 ? 15 : N === 13 ? 30 : 40;
      if(winProb!==null && winProb<-0.85 && game.moveCount>resignThresh) {
        this._resignConsec++;
        if(this._resignConsec>=3) { this._resignConsec=0; return AI_RESIGN; }
      } else { this._resignConsec=0; }

      // ── 9×9 混合模式：NN top-K → MCTS 验证 ─────────────────
      // 用 NN policy 筛选最有价值的候选手，再用 MCTS 做战术校验
      // 既保留 NN 的布局直觉，又通过 MCTS 弥补小棋盘偶发误判
      if (N === 9) {
        const K = Math.min(20, validMoves.length);
        const topCands = validMoves
          .map(([r,c]) => ({ move:[r,c], p: policy[r*N+c] }))
          .sort((a,b) => b.p - a.p)
          .slice(0, K)
          .map(x => x.move);
        const mctsN = this.diff==='hard' ? 2500 : this.diff==='medium' ? 1000 : 400;
        this._setBadge('🧠 KataGo + MCTS', '#7b68ee');
        if(onStatus) onStatus('browser_thinking');
        return this.fallback._mcts(game, color, topCands, mctsN);
      }

      // ── 13×13 / 19×19：NN 落子（带 MCTS fallback）──────────
      // 直接扫描棋盘空格 + policy > -4990（避免 validMoves 坐标不一致问题）
      const MASK_THR = -4990;
      const nnCands = [];
      for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
        if (game.board[r][c] === 0) {
          const p = policy[r*N+c];
          if (p > MASK_THR) nnCands.push([r, c, p]);
        }
      }
      console.log('[KataGo] nnCands:', nnCands.length, 'best=', nnCands.length ? Math.max(...nnCands.map(x=>x[2])).toFixed(2) : 'none');
      if (!nnCands.length) {
        // NN 完全无效，降级至强 MCTS
        console.warn('[KataGo] NN 无有效候选，降级至 MCTS');
        const mctsN = this.diff==='hard' ? 4000 : this.diff==='medium' ? 2000 : 600;
        this._setBadge('⚙️ MCTS 深度搜索中…', '#5ba85b');
        if(onStatus) onStatus('local_mcts');
        return this.fallback._mcts(game, color, null, mctsN);
      }
      this._setBadge(`🧠 KataGo 神经网络 (${N}×${N})`, '#7b68ee');
      // 难度噪声：挑战≈确定性，进阶加扰动
      const noise = this.diff==='medium' ? 1.5 : 0.15;
      let best=null, bestScore=-Infinity;
      for(const[r,c,p] of nnCands) {
        const score = p + (Math.random()-0.5)*noise;
        if(score>bestScore) { bestScore=score; best=[r,c]; }
      }
      // 验证 best 是否合法（不是自杀、不是劫），否则退回 validMoves
      if (best && !game.isValidMove(best[0], best[1], color)) {
        best = validMoves.length ? validMoves[0] : null;
      }
      return best;
    } catch(e) {
      console.warn('KataGo 推理失败:', e);
      this._setBadge('⚙️ MCTS 深度搜索中…', '#5ba85b');
      if(onStatus) onStatus('local_mcts');
      return this.fallback.getBestMove(game, color);
    }
  }
}

function renderChapters() {

function showLevelSelect(ch) {

  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  ch.levels.forEach((lid, i) => {
    const lv = LEVELS[lid];
    const done = completedLevels.has(lid);
    const firstUndone = ch.levels.findIndex(l => !completedLevels.has(l));
    const locked = i > firstUndone + 1;
    const btn = document.createElement('div');
    btn.className = 'level-btn' + (done?' completed':(locked?' locked':(i===firstUndone?' cur':'')));
    btn.innerHTML = `<div class="lnum">${done?'✓':lid+1}</div><div style="font-size:.72rem;margin-top:3px">${lv.title}</div>`;
    if (!locked) btn.onclick = () => startLevel(lid);

  });

}

function startLevel(lid) {
  campLevel = LEVELS[lid];
  campGame = new GoGame(campLevel.boardSize);
  campRenderer = new BoardRenderer(document.getElementById('board-canvas'));
  campRenderer.setup(campLevel.boardSize);
  campGame.currentPlayer = campLevel.playerColor;
  atariCount = 0;

  // 初始布局
  for (const [r,c,col] of (campLevel.setup||[])) campGame.board[r][c] = col;

  // 关联AI（概念驱动教学AI）
  campGame._ai = new ConceptAI(campLevel.chapterIdx, campLevel.aiPassivity);

  // UI
  const ch = CHAPTERS.find(c => c.levels.includes(lid));
  document.getElementById('s-tag').textContent = `第${ch?ch.id+1:1}章 · 第${lid+1}关`;
  document.getElementById('s-title').textContent = campLevel.title;
  document.getElementById('s-concept').textContent = campLevel.concept;
  document.getElementById('s-goal').textContent = campLevel.goal.text;
  document.getElementById('s-hint').textContent = campLevel.hint;
  document.getElementById('s-hint').classList.remove('on');
  document.getElementById('ai-think-label').textContent = '';

  // 势力图
  const infToggle = document.getElementById('inf-toggle');
  infToggle.checked = !!campLevel.forceInfluence;
  campRenderer.showInfluence = !!campLevel.forceInfluence;

  updateCampStatus();
  setupCampCanvas();
  showScreen('game-screen');
  campRenderer.draw(campGame);
}

function setupCampCanvas() {
  const cv = document.getElementById('board-canvas');
  cv.style.touchAction = 'none';
  cv.onpointerdown  = e => { e.preventDefault(); handleCampClick(e); };
  cv.onpointermove  = e => {
    if (!campRenderer||!campGame) return;
    const pt = campRenderer.getIntersection(e.clientX, e.clientY);
    campRenderer.hover = pt ? {r:pt[0], c:pt[1]} : null;
    campRenderer.hoverColor = campGame.currentPlayer;
    campRenderer.draw(campGame);
  };
  cv.onpointerleave = () => { if (campRenderer) { campRenderer.hover=null; campRenderer.draw(campGame); } };
}

function handleCampClick(e) {
  if (!campLevel||!campGame||!campRenderer||aiThinking) return;
  if (campGame.currentPlayer !== campLevel.playerColor) return;
  // support both mouse and pointer events
  const clientX = e.clientX, clientY = e.clientY;
  const pt = campRenderer.getIntersection(clientX, clientY);
  if (!pt) return;
  const [r,c] = pt;

  // 查看气模式（点击棋子显示气）
  if (campLevel.showLiberties && campGame.board[r][c] !== 0) {
    const g = campGame.getGroup(r,c);
    campRenderer.highlights = [
      ...g.stones.map(([sr,sc])=>({r:sr,c:sc,type:'atari'})),
      ...g.liberties.map(([sr,sc])=>({r:sr,c:sc,type:'lib'}))
    ];
    campRenderer.draw(campGame);
    return;
  }

  if (!campGame.isValidMove(r,c,campGame.currentPlayer)) return;
  campGame.placeStone(r,c);
  campRenderer.lastMove = [r,c];
  campRenderer.highlights = [];
  campRenderer.draw(campGame);
  updateCampStatus();

  // 打吃计数
  if (campLevel.goal.type === 'atari_opp') {
    const opp = 3 - campLevel.playerColor;
    for (let br=0;br<campGame.size;br++) for (let bc=0;bc<campGame.size;bc++) {
      if (campGame.board[br][bc] === opp) {
        if (campGame.getGroup(br,bc).liberties.length === 1) { atariCount++; break; }
      }
    }
  }

  if (checkCampGoal()) return;

  // AI回应
  aiThinking = true;
  document.getElementById('ai-think-label').textContent = 'AI思考中…';
  setTimeout(() => {
    const aiMove = campGame._ai.getBestMove(campGame, campGame.currentPlayer);
    if (aiMove) { campGame.placeStone(aiMove[0],aiMove[1]); campRenderer.lastMove=aiMove; }
    else campGame.pass();
    campRenderer.draw(campGame);
    aiThinking = false;
    document.getElementById('ai-think-label').textContent = '';
    updateCampStatus();
    checkCampGoal();
  }, 500);
}

function checkCampGoal() {
  if (!campLevel) return false;
  const g = campLevel.goal, game = campGame;
  const playerCap = campLevel.playerColor === 1 ? game.captured[0] : game.captured[1];

  if (g.type === 'place_any' && game.moveCount >= (g.count||1)) { setTimeout(levelComplete,400); return true; }
  if (g.type === 'capture' && playerCap >= g.count) { setTimeout(levelComplete,400); return true; }
  if (g.type === 'atari_opp') {
    // 重新统计atari：扫描所有对手棋串
    let curAtari = 0;
    const opp = 3 - campLevel.playerColor;
    const seen = new Set();
    for (let r=0;r<game.size;r++) for (let c=0;c<game.size;c++) {
      if (game.board[r][c]!==opp) continue;
      const k = r*100+c;
      if (seen.has(k)) continue;
      const gr = game.getGroup(r,c);
      gr.stones.forEach(([sr,sc])=>seen.add(sr*100+sc));
      if (gr.liberties.length===1) curAtari++;
    }
    if (atariCount >= g.count) { setTimeout(levelComplete,400); return true; }
  }
  if (g.type === 'influence_demo' && game.moveCount >= 8) { setTimeout(levelComplete,400); return true; }
  if (g.type === 'territory') {
    const sc = game.estimateScore(0);
    const myT = campLevel.playerColor===1 ? sc.black : sc.white;
    if (myT >= g.minTerritory) { setTimeout(levelComplete,400); return true; }
  }
  if (g.type === 'full_game' && game.consecutivePasses >= 2) { setTimeout(levelComplete,400); return true; }
  if (g.type === 'make_eye' || g.type === 'make_eyes') {
    if (countEyes(game, campLevel.playerColor) >= (g.count||1)) { setTimeout(levelComplete,400); return true; }
  }
  return false;
}

function countEyes(game, color) {
  let eyes = 0;
  for (let r=0;r<game.size;r++) for (let c=0;c<game.size;c++) {
    if (game.board[r][c]!==0) continue;
    const nb = game.neighbors(r,c);
    if (nb.length >= 2 && nb.every(([nr,nc])=>game.board[nr][nc]===color)) eyes++;
  }
  return eyes;
}

function levelComplete() {
  if (!campLevel) return;
  const lv = campLevel;
  completedLevels.add(lv.id);
  localStorage.setItem('xtgo_completed', JSON.stringify([...completedLevels]));
  document.getElementById('c-icon').textContent = lv.id===14?'🎊':'🎉';
  document.getElementById('c-title').textContent = lv.id===14?'课程完成！':'过关！';
  document.getElementById('c-body').textContent = lv.completion;
  const nb = document.getElementById('next-btn');
  if (lv.id+1 < LEVELS.length) {
    nb.style.display = '';
    nb.onclick = () => { closeModal('complete-modal'); startLevel(lv.id+1); };
  } else {
    nb.style.display = 'none';
  }
  document.getElementById('complete-modal').classList.add('on');
}

function undoMove() {

function passMove() {
  if (!campGame||aiThinking) return;

  aiThinking=true;

function selectSize(sz) {

  };

function startBattle(diff) {
  battleDiff = diff;
  battleMoveHistory = [];
  const localAI = new GoAI(diff);
  // 入门=本地MCTS（~业余15-20级，即时）；进阶/挑战=浏览器神经网络AI（19×19约业余1-2段）
  battleAI = diff === 'easy' ? localAI : new BrowserKataGoAI(diff, localAI);
  battGame = new GoGame(battleSize);
  battRenderer = new BoardRenderer(document.getElementById('battle-canvas'));
  battRenderer.setup(battleSize); aiThinking = false;
  const sizeNames = {9:'9路',13:'13路',19:'19路'};
  const diffNames = {easy:'入门',medium:'进阶',hard:'挑战'};
  document.getElementById('b-diff-tag').textContent = `${sizeNames[battleSize]} · ${diffNames[diff]}`;
  document.getElementById('b-inf-toggle').checked = false;
  battRenderer.showInfluence = false;
  updateBattleStatus();
  setupBattleCanvas();
  showScreen('battle-screen');
  battRenderer.draw(battGame);
}

function setupBattleCanvas() {
  const cv = document.getElementById('battle-canvas');
  cv.style.touchAction = 'none';
  cv.onpointerdown  = e => { e.preventDefault(); handleBattleClick(e); };
  cv.onpointermove  = e => {
    if (!battRenderer||!battGame||aiThinking) return;
    const pt = battRenderer.getIntersection(e.clientX, e.clientY);
    battRenderer.hover = pt ? {r:pt[0], c:pt[1]} : null;
    battRenderer.hoverColor = battGame.currentPlayer;
    battRenderer.draw(battGame);
  };
  cv.onpointerleave = () => { if (battRenderer) { battRenderer.hover=null; battRenderer.draw(battGame); } };
}

async function handleBattleClick(e) {
  if (!battGame||!battRenderer||aiThinking||battGame.currentPlayer!==1) return;
  const pt = battRenderer.getIntersection(e.clientX, e.clientY);
  if (!pt) return;
  const [r,c]=pt;
  if (!battGame.isValidMove(r,c,1)) return;
  battGame.placeStone(r,c);
  battleMoveHistory.push({color:'B', pos:toGTP(r,c,battGame.size)});
  battRenderer.lastMove=[r,c]; battRenderer.hover=null;
  battRenderer.draw(battGame); updateBattleStatus();
  if (battGame.consecutivePasses>=2){endBattle();return;}
  await _doAIMove();
}

async function _doAIMove() {
  aiThinking=true;
  const thinkEl = document.getElementById('b-ai-think');
  let m;
  if (battleAI instanceof BrowserKataGoAI) {
    thinkEl.textContent = '⏳ 加载 AI 模型…';
    m = await battleAI.getBestMoveAsync(battGame, 2, (src) => {
      if (src === 'browser_loading') thinkEl.textContent = '⏳ 加载神经网络模型（首次约30秒）…';
      else if (src === 'browser_thinking') thinkEl.textContent = '🧠 KataGo 神经网络思考中…';
      else if (src === 'local_mcts') thinkEl.textContent = '⚙️ MCTS 深度搜索中…';
      else if (src === 'local') thinkEl.textContent = '⚙️ MCTS 深度搜索中…';
    });
  } else {
    thinkEl.textContent = '🤖 本地 AI 思考中…';
    await new Promise(r => setTimeout(r, 50));  // 让浏览器先刷新文字
    m = battleAI.getBestMove(battGame, 2);
  }
  // AI 认输处理
  if (m === AI_RESIGN) {
    aiThinking = false; thinkEl.textContent = '';
    aiResignBattle(); return;
  }
  if(m){
    battGame.placeStone(m[0],m[1]);
    battleMoveHistory.push({color:'W', pos:toGTP(m[0],m[1],battGame.size)});
    battRenderer.lastMove=m;
  } else {
    battGame.pass();
    battleMoveHistory.push({color:'W', pos:'pass'});
    battRenderer.lastMove=null;
  }
  battRenderer.draw(battGame); aiThinking=false;
  thinkEl.textContent='';
  updateBattleStatus();
  if(battGame.consecutivePasses>=2) endBattle();
}

function toggleBattleInf() {
  if(battRenderer){battRenderer.showInfluence=document.getElementById('b-inf-toggle').checked;battRenderer.draw(battGame);}
}
async function battlePass() {
  if(!battGame||aiThinking) return;
  battGame.pass();
  battleMoveHistory.push({color:'B', pos:'pass'});
  battRenderer.lastMove=null; battRenderer.draw(battGame); updateBattleStatus();
  if(battGame.consecutivePasses>=2){endBattle();return;}
  await _doAIMove();
}
function battleUndo() {
  if(!battGame||aiThinking) return;
  battGame.undo(); battGame.undo();

// 死活题数据
// setup: [[r,c,color],...] 颜色1=黑2=白
// goal: 'kill'=提走目标白棋 | 'live'=让黑棋形成两眼
